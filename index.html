<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Checker Ultra Pro - Rei do APK</title>
    <style>
        :root {
            --gold: #f1c40f;
            --dark-bg: #0a0a0a;
            --card-bg: #151515;
            --live: #2ecc71;
            --die: #e74c3c;
            --blue: #3498db;
        }

        body {
            background-color: var(--dark-bg);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 95%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
        }

        h2 {
            text-align: center;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 10px;
        }

        /* Stats */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border-bottom: 3px solid #444;
        }

        .stat-card.live { border-color: var(--live); }
        .stat-card.dead { border-color: var(--die); }
        .stat-card span { display: block; font-size: 22px; font-weight: bold; }
        .stat-card label { font-size: 11px; color: #aaa; text-transform: uppercase; }

        /* Inputs */
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .input-grid { grid-template-columns: 1fr; }
        }

        .input-group { display: flex; flex-direction: column; }
        label { margin-bottom: 8px; font-size: 13px; color: var(--gold); font-weight: bold; }

        textarea {
            height: 120px;
            background: #000;
            color: #00ff41;
            border: 1px solid #444;
            border-radius: 5px;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            resize: none;
        }

        .file-label {
            margin-top: 8px;
            padding: 8px;
            background: #333;
            color: #fff;
            font-size: 11px;
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Progress & Log */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #222;
            border-radius: 4px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        #progress-fill { width: 0%; height: 100%; background: var(--gold); transition: 0.3s; }

        #log_view {
            height: 250px;
            background: #050505;
            border-radius: 8px;
            padding: 10px;
            overflow-y: auto;
            font-size: 12px;
            border: 1px solid #222;
            margin-bottom: 20px;
            font-family: 'Consolas', monospace;
        }

        /* Buttons */
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-row { grid-column: span 2; }
        
        button {
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-start { background: var(--live); color: #000; }
        .btn-pause { background: var(--die); color: #fff; }
        .btn-copy { background: var(--blue); color: #fff; }
        .btn-download { background: var(--gold); color: #000; }
        .btn-clear { background: #444; color: #fff; }

        button:hover:not(:disabled) { opacity: 0.8; transform: scale(0.98); }
        button:disabled { opacity: 0.3; }

        .live-text { color: var(--live); }
        .dead-text { color: var(--die); opacity: 0.6; }
        .info-text { color: var(--blue); }

    </style>
</head>
<body>

<div class="container">
    <h2>👑 REI DO APK - PREMIUM CHECKER 👑</h2>

    <div class="stats-container">
        <div class="stat-card">
            <span id="count-total">0</span>
            <label>Carregados</label>
        </div>
        <div class="stat-card live">
            <span id="count-live" class="live-text">0</span>
            <label>Lives ✅</label>
        </div>
        <div class="stat-card dead">
            <span id="count-dead" class="dead-text">0</span>
            <label>Deads ❌</label>
        </div>
    </div>

    <div class="progress-bar">
        <div id="progress-fill"></div>
    </div>

    <div class="input-grid">
        <div class="input-group">
            <label>LISTA COMBO</label>
            <textarea id="comboList" placeholder="email:senha"></textarea>
            <label class="file-label">📁 Carregar TXT
                <input type="file" hidden accept=".txt" onchange="loadFile(this, 'comboList')">
            </label>
        </div>
        <div class="input-group">
            <label>LISTA COOKIES</label>
            <textarea id="cookieList" placeholder="JSON/Netscape cookies"></textarea>
            <label class="file-label">📁 Carregar TXT
                <input type="file" hidden accept=".txt" onchange="loadFile(this, 'cookieList')">
            </label>
        </div>
    </div>

    <div id="log_view"></div>

    <div class="btn-group">
        <button id="startBtn" class="btn-start full-row" onclick="startMegaCheck()">🚀 Iniciar Varredura</button>
        <button id="pauseBtn" class="btn-pause" onclick="stopCheck()" disabled>⏸ Parar</button>
        <button class="btn-clear" onclick="clearLogs()">🧹 Limpar</button>
        <button class="btn-copy" onclick="copyLives()">📋 Copiar Lives</button>
        <button class="btn-download" onclick="downloadLives()">📥 Baixar .TXT</button>
    </div>
</div>

<script>
    let isRunning = false;
    let liveCount = 0;
    let deadCount = 0;
    let livesFound = []; 
    let queue = [];
    let currentIndex = 0;

    function loadFile(input, targetId) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById(targetId).value = e.target.result;
            updateTotalCount();
        };
        reader.readAsText(file);
    }

    function updateTotalCount() {
        const c = document.getElementById('comboList').value.split('\n').filter(l => l.trim()).length;
        const ck = document.getElementById('cookieList').value.split('\n').filter(l => l.trim()).length;
        document.getElementById('count-total').innerText = c + ck;
    }

    function log(msg, typeClass) {
        const logView = document.getElementById('log_view');
        const div = document.createElement('div');
        div.className = typeClass;
        div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logView.prepend(div);
    }

    async function startMegaCheck() {
        const combos = document.getElementById('comboList').value.split('\n').filter(l => l.trim());
        const cookies = document.getElementById('cookieList').value.split('\n').filter(l => l.trim());
        
        if (currentIndex === 0) {
            queue = [
                ...combos.map(v => ({ data: v, type: 'COMBO' })),
                ...cookies.map(v => ({ data: v, type: 'COOKIE' }))
            ];
        }

        if (queue.length === 0) return alert("Nenhum dado carregado!");

        isRunning = true;
        toggleButtons(true);
        log("Varredura iniciada...", "info-text");

        for (let i = currentIndex; i < queue.length; i++) {
            if (!isRunning) {
                currentIndex = i;
                break;
            }

            await processItem(queue[i]);
            
            let percent = ((i + 1) / queue.length) * 100;
            document.getElementById('progress-fill').style.width = percent + "%";
        }

        if (currentIndex >= queue.length - 1) {
            log("Fim da lista atingido.", "info-text");
            stopCheck();
            currentIndex = 0; 
        }
    }

    function processItem(item) {
        return new Promise(resolve => {
            setTimeout(() => {
                const isLive = Math.random() > 0.8; // Simulação
                
                if (isLive) {
                    liveCount++;
                    livesFound.push(item.data);
                    document.getElementById('count-live').innerText = liveCount;
                    log(`LIVE ✅ | ${item.type} | ${item.data.substring(0,25)}...`, 'live-text');
                } else {
                    deadCount++;
                    document.getElementById('count-dead').innerText = deadCount;
                    log(`DEAD ❌ | ${item.type} | Inválido`, 'dead-text');
                }
                resolve();
            }, 400); 
        });
    }

    function stopCheck() {
        isRunning = false;
        toggleButtons(false);
        log("Processo pausado/parado.", "info-text");
    }

    function toggleButtons(running) {
        document.getElementById('startBtn').disabled = running;
        document.getElementById('pauseBtn').disabled = !running;
    }

    function clearLogs() {
        if(confirm("Deseja limpar tudo?")) {
            location.reload();
        }
    }

    // NOVA FUNÇÃO: Copiar para área de transferência
    function copyLives() {
        if (livesFound.length === 0) return alert("Nenhuma Live para copiar!");
        const text = livesFound.join('\n');
        navigator.clipboard.writeText(text).then(() => {
            alert(livesFound.length + " Lives copiadas com sucesso!");
        });
    }

    // NOVA FUNÇÃO: Baixar arquivo .txt
    function downloadLives() {
        if (livesFound.length === 0) return alert("Nenhuma Live para baixar!");
        const blob = new Blob([livesFound.join('\n')], { type: 'text/plain' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `lives_reidoapk_${new Date().getTime()}.txt`;
        a.click();
        window.URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
